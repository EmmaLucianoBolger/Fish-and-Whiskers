<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish & Whiskers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/starfish.jpg">
</head>
<body>

    <header>
        <h1>Fish & Whiskers</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <section class="products">
        <div class="product">
            <img src="img/goldFish.jpg" alt="goldFish"> <!--add pics -->
            <h2>Golden Fish</h2>
            <p>10 euro</p>
            <button onclick="addToCart('Golden Fish', 10)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="img/fluffyCat.jpg" alt="fluffyCat"><!--add pics -->
            <h2>Fluffy Cat </h2>
            <p>50 euro</p>
            <button onclick="addToCart('Fluffy Cat', 50)">Add to Cart</button>
        </div>
        <div class="product">
            <img src="img/cuteKitten.jpg" alt="cuteKitten"> <!--add pic-->
            <h2>cute kitten</h2>
            <p>40 euro</p>
            <button onclick="addToCart('Betta Fish', 15)">Add to cart</button>
        </div>
        <div class="product">
            <img src="img/codFish.jpg" alt="codFish"> <!--add pic-->
            <h2>cod fish</h2>
            <p>15 euro</p>
            <button onclick="addToCart('Cod Fish', 15)">add to cart</button>
        </div>
        <div class="product">
            <img src="img/tropicalFish.jpg" alt="tropicalFish"> <!--add pic-->
            <h2>tropical fish</h2>
            <p>320 euro</p>
            <button onclick="addToCart('tropical fish',15)">add to cart</button>
        </div>
        <div class="product">
            <img src="img/scottishCat.jpg" alt="scottishCat"> <!--add pic-->
            <h2>scottish short hair cat</h2>
            <p>2000 euro</p>
            <button onclick="addToCart('scottish short hair cat',15)">add to cart</button>
        </div>
        <div class="product">
            <img src="img/idkFish.jpg" alt="idkFish"> <!--add pic-->
            <h2>idk know other fish to sell</h2>
            <p>50,000 euro</p>
            <button onclick="addToCart ('idk other fish to sell', 15)">add to cart</button>
        </div>
        <div class="product">
            <img src="img/justinBeever.jpg" alt="Justin Beever">
            <h2>Justin Beever</h2>
            <p>1000 euro because of cochella</p>
            <button onclick="addToCart ('justin beever', 15)">add to cart</button>
        </div>
    </section>

    <script src="script.js"></script>
    <script src="rain.js"></script>
    
</body>
</html>
